<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="640" fill="#1C1433"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#AFA9EC" stroke-width="0.2" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1280" height="3" fill="#5DCAA5"/>

  <!-- === LOGO MARK === -->
  <polygon points="160,240 208,268 208,324 160,352 112,324 112,268"
    fill="none" stroke="#5DCAA5" stroke-width="3"/>
  <circle cx="160" cy="296" r="9" fill="#5DCAA5"/>
  <line x1="160" y1="296" x2="160" y2="240" stroke="#5DCAA5" stroke-width="2" opacity="0.5"/>
  <line x1="160" y1="296" x2="208" y2="268" stroke="#5DCAA5" stroke-width="2" opacity="0.5"/>
  <line x1="160" y1="296" x2="208" y2="324" stroke="#5DCAA5" stroke-width="2" opacity="0.5"/>
  <line x1="160" y1="296" x2="160" y2="352" stroke="#5DCAA5" stroke-width="2" opacity="0.5"/>
  <line x1="160" y1="296" x2="112" y2="324" stroke="#5DCAA5" stroke-width="2" opacity="0.5"/>
  <line x1="160" y1="296" x2="112" y2="268" stroke="#5DCAA5" stroke-width="2" opacity="0.5"/>
  <circle cx="160" cy="240" r="5" fill="#AFA9EC"/>
  <circle cx="208" cy="268" r="5" fill="#AFA9EC"/>
  <circle cx="208" cy="324" r="5" fill="#AFA9EC"/>
  <circle cx="160" cy="352" r="5" fill="#AFA9EC"/>
  <circle cx="112" cy="324" r="5" fill="#AFA9EC"/>
  <circle cx="112" cy="268" r="5" fill="#AFA9EC"/>

  <!-- === WORDMARK === -->
  <text x="252" y="320"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="88" font-weight="500" fill="#FFFFFF" letter-spacing="16">NEXUS</text>

  <!-- Separator line -->
  <rect x="112" y="388" width="760" height="1" fill="#3C3489"/>

  <!-- Tagline -->
  <text x="112" y="424"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="22" fill="#AFA9EC" letter-spacing="1">
    Deja de escribir prompts. Empieza a escribir intenciones.
  </text>

  <!-- === STATS === -->
  <!-- Stat 1 -->
  <rect x="112" y="464" width="200" height="64" rx="8" fill="#26215C"/>
  <text x="132" y="490" font-family="ui-monospace, monospace" font-size="11" fill="#7F77DD">tests</text>
  <text x="132" y="514" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#FFFFFF">90 pasando</text>

  <!-- Stat 2 -->
  <rect x="328" y="464" width="200" height="64" rx="8" fill="#04342C"/>
  <text x="348" y="490" font-family="ui-monospace, monospace" font-size="11" fill="#1D9E75">velocidad</text>
  <text x="348" y="514" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#FFFFFF">~1 segundo</text>

  <!-- Stat 3 -->
  <rect x="544" y="464" width="200" height="64" rx="8" fill="#4A1B0C"/>
  <text x="564" y="490" font-family="ui-monospace, monospace" font-size="11" fill="#D85A30">eficiencia</text>
  <text x="564" y="514" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#FFFFFF">10x menos tokens</text>

  <!-- === CÓDIGO SNIPPET (derecha) === -->
  <rect x="880" y="200" width="360" height="280" rx="12" fill="#26215C"/>
  <!-- Dots -->
  <circle cx="908" cy="224" r="5" fill="#D85A30" opacity="0.8"/>
  <circle cx="924" cy="224" r="5" fill="#EF9F27" opacity="0.8"/>
  <circle cx="940" cy="224" r="5" fill="#1D9E75" opacity="0.8"/>
  <!-- Code lines -->
  <text x="908" y="260" font-family="ui-monospace, monospace" font-size="13" fill="#AFA9EC">Page Dashboard</text>
  <text x="928" y="282" font-family="ui-monospace, monospace" font-size="13" fill="#5DCAA5">  Layout SplitView</text>
  <text x="928" y="304" font-family="ui-monospace, monospace" font-size="13" fill="#5DCAA5">  Section Resumen <tspan fill="#D85A30">#glass</tspan></text>
  <text x="948" y="326" font-family="ui-monospace, monospace" font-size="13" fill="#AFA9EC">    Text <tspan fill="#EF9F27">"Ingresos"</tspan> <tspan fill="#D85A30">!bold</tspan></text>
  <text x="948" y="348" font-family="ui-monospace, monospace" font-size="13" fill="#AFA9EC">    Chart <tspan fill="#7F77DD">&lt; DatosVentas</tspan></text>
  <text x="928" y="370" font-family="ui-monospace, monospace" font-size="13" fill="#5DCAA5">  Section Pedidos</text>
  <text x="948" y="392" font-family="ui-monospace, monospace" font-size="13" fill="#AFA9EC">    Table <tspan fill="#7F77DD">&lt; Pedido</tspan></text>

  <!-- npm badge -->
  <rect x="880" y="500" width="120" height="32" rx="6" fill="#3C3489"/>
  <text x="940" y="521" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#CECBF6">npm i nxlang</text>

  <!-- MIT badge -->
  <rect x="1012" y="500" width="80" height="32" rx="6" fill="#085041"/>
  <text x="1052" y="521" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#9FE1CB">MIT</text>

  <!-- Bottom accent -->
  <rect x="0" y="637" width="1280" height="3" fill="#3C3489"/>
</svg>
